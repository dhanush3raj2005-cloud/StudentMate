<!DOCTYPE html>
<html>
<head>
<title>My Resume</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* === BODY & WRAPPER === */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f3f4f6;
    color: #1f2937;
}

.wrapper {
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* === RESUME CARD === */
.resume {
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    display: grid;
    grid-template-columns: 32% 68%;
    box-shadow: 0 15px 50px rgba(0,0,0,0.1);
    border-radius: 15px;
    overflow: hidden;
}

/* === LEFT COLUMN === */
.left {
    background: linear-gradient(180deg, #4f46e5, #6366f1);
    color: white;
    padding: 30px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* PHOTO */
#rPhoto {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
    display: none;
    border: 4px solid white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* NAME */
.name {
    font-size: 22px;
    font-weight: 700;
    margin: 5px 0;
}

/* CONTACT INFO */
.left p {
    margin: 6px 0;
    font-size: 14px;
    line-height: 1.4;
    text-align: left;
    width: 100%;
}

/* LEFT SECTIONS */
.section {
    margin-top: 25px;
    width: 100%;
}

.section h3 {
    color: white;
    font-size: 16px;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.6);
    padding-bottom: 5px;
    text-align: left;
}

.skill-title {
    font-weight: 600;
    margin-top: 10px;
    font-size: 14px;
    text-align: left;
}

/* === RIGHT COLUMN === */
.right {
    padding: 25px 35px;
    text-align: left;
    background: #f9fafb;
}

/* RIGHT SECTION HEADINGS */
.right .section h3 {
    color: #4f46e5;
    font-size: 18px;
    margin-bottom: 12px;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 5px;
}

/* RIGHT TEXT */
.right .section p {
    font-size: 14px;
    margin: 6px 0;
    line-height: 1.6;
}

/* DOWNLOAD BUTTON */
button {
    padding: 12px 25px;
    background: #4f46e5;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    margin-top: 20px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

button:hover {
    background: #4338ca;
}

/* PRINT SETTINGS */
@media print {
    body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        margin: 0;
    }

    .resume {
        box-shadow: none;
        width: 100%;
        height: 100vh; /* Full page height */
        min-height: auto;
        display: grid;
        grid-template-columns: 32% 68%;
        overflow: visible;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    .left {
        background: linear-gradient(180deg, #4f46e5, #6366f1) !important;
        height: 100%; /* Full height of column */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    button {
        display: none;
    }
}
</style>
</head>

<body>
<div class="wrapper">
<div class="resume">

<!-- LEFT -->
<div class="left">
    <img id="rPhoto">
    <div id="rFirstName" class="name"></div>
    <div id="rLastName" class="name"></div>
    <p id="rEmail"></p>
    <p id="rPhone"></p>
    <p id="rAddress"></p>

    <!-- TECH SKILLS -->
    <div class="section" id="techSection">
        <h3>Technical Skills</h3>
        <p class="skill-title">Front-End</p>
        <p id="rFrontend"></p>
        <p class="skill-title">Back-End</p>
        <p id="rBackend"></p>
        <p class="skill-title">Database</p>
        <p id="rDatabase"></p>
        <p class="skill-title">Tools</p>
        <p id="rTools"></p>
    </div>

    <!-- SOFT SKILLS -->
    <div class="section" id="softSection">
        <h3>Soft Skills</h3>
        <p id="rSoftskills"></p>
    </div>
</div>

<!-- RIGHT -->
<div class="right">

    <div class="section" id="objectiveSection">
        <h3>Career Objective</h3>
        <p id="rObjective"></p>
    </div>

    <div class="section" id="educationSection">
        <h3>Education</h3>
        <p id="rDegree"></p>
        <p id="rCollege"></p>
        <p id="rYear"></p>
        <p id="rCgpa"></p>
    </div>

    <div class="section" id="projectsSection">
        <h3>Projects</h3>
        <p id="rProjects"></p>
    </div>

    <div class="section" id="experienceSection">
        <h3>Experience</h3>
        <p id="rExperience"></p>
    </div>

    <div class="section" id="certificatesSection">
        <h3>Certificates</h3>
        <p id="rCertificates"></p>
    </div>

    <button onclick="window.print()">Download PDF</button>
</div>

</div>
</div>

<script>
// PHOTO
let photo = localStorage.getItem("photo");
if(photo){
    document.getElementById("rPhoto").src = photo;
    document.getElementById("rPhoto").style.display = "block";
}

// NAME
document.getElementById("rFirstName").innerText = localStorage.getItem("firstname") || "";
document.getElementById("rLastName").innerText = localStorage.getItem("lastname") || "";

// CONTACT
document.getElementById("rEmail").innerText = localStorage.getItem("email") || "";
document.getElementById("rPhone").innerText = localStorage.getItem("phone") || "";
document.getElementById("rAddress").innerText = localStorage.getItem("address") || "";

// OBJECTIVE
let obj = localStorage.getItem("objective");
if(obj){
    document.getElementById("rObjective").innerText = obj;
}else{
    document.getElementById("objectiveSection").style.display="none";
}

// TECH SKILLS
let fe = localStorage.getItem("frontend");
let be = localStorage.getItem("backend");
let db = localStorage.getItem("database");
let tools = localStorage.getItem("tools");

if(fe || be || db || tools){
    document.getElementById("rFrontend").innerText = fe || "";
    document.getElementById("rBackend").innerText = be || "";
    document.getElementById("rDatabase").innerText = db || "";
    document.getElementById("rTools").innerText = tools || "";
}else{
    document.getElementById("techSection").style.display="none";
}

// SOFT SKILLS
let soft = localStorage.getItem("softskills");
if(soft){
    document.getElementById("rSoftskills").innerText = soft;
}else{
    document.getElementById("softSection").style.display="none";
}

// EDUCATION
let degree = localStorage.getItem("degree");
let college = localStorage.getItem("college");
let year = localStorage.getItem("year");
let cgpa = localStorage.getItem("cgpa");

if(degree || college || year || cgpa){
    document.getElementById("rDegree").innerText = degree || "";
    document.getElementById("rCollege").innerText = college || "";
    document.getElementById("rYear").innerText = year || "";
    document.getElementById("rCgpa").innerText = cgpa || "";
}else{
    document.getElementById("educationSection").style.display="none";
}

// PROJECTS
let proj = localStorage.getItem("projects");
if(proj){
    document.getElementById("rProjects").innerText = proj;
}else{
    document.getElementById("projectsSection").style.display="none";
}

// EXPERIENCE
let exp = localStorage.getItem("experience");
if(exp){
    document.getElementById("rExperience").innerText = exp;
}else{
    document.getElementById("experienceSection").style.display="none";
}

// CERTIFICATES
let cert = localStorage.getItem("certificates");
if(cert){
    document.getElementById("rCertificates").innerText = cert;
}else{
    document.getElementById("certificatesSection").style.display="none";
}
</script>

</body>
</html>
