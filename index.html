<!DOCTYPE html>
<html>
<head>
    <title>StudentMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background-color: white;
            position: sticky;
            top: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #0f172a;
        }

        nav a {
            text-decoration: none;
            color: #334155;
            margin-left: 30px;
            font-size: 15px;
        }

        nav a:hover {
            color: #2563eb;
        }

        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
        }

        .hero-content {
            max-width: 750px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 35px;
            color: #cbd5e1;
        }

        .btn {
      padding: 12px 30px;
            border-radius: 40px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(37,99,235,0.4);
            margin-top: 15px;
}

        .btn:hover {
            
           background: #1d4ed8;
            transform: translateY(-3px);

        }

        footer {
            text-align: center;
            padding: 25px;
            background-color: #0f172a;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            nav {
                margin-top: 10px;
            }

            nav a {
                margin-left: 15px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🎓 StudentMate</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="cgp.html">CGPA</a>
        <a href="input.html">Resume</a>
        <a href="project_login.html">Projects</a>
        <a href="login_chat.html">Career</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Your Complete Student Productivity Platform</h1>
        <p>
            StudentMate helps you calculate CGPA, build professional resumes,
            manage academic projects, and get career guidance.
        </p>
        <button class="btn" onclick="location.href='cgp.html'">
            Get Started
        </button>
    </div>
</section>

<footer>
    © 2026 StudentMate | Academic Project | Email: dhaush3raj2005@gmail.com
</footer>

</body>
</html>
