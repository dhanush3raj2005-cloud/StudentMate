<!DOCTYPE html>
<html>
<head>
  <title>StudentMate - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 95%;
      max-width: 1000px;
      background: #161b22;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      border: 1px solid #30363d;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #58a6ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #8b949e;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
    }

    .card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 18px;
      padding: 35px 25px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: #58a6ff;
      box-shadow: 0 15px 30px rgba(88,166,255,0.2);
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .card h3 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .card p {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 13px;
      color: #6e7681;
      border-top: 1px solid #30363d;
      padding-top: 20px;
    }

    @media (max-width: 600px) {
      .app {
        padding: 25px;
      }

      .header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <div class="header">
      <h1>🎓 StudentMate</h1>
      <p>Choose your role to continue</p>
    </div>

    <div class="grid">

      <div class="card" onclick="location.href='junior.html'">
        <div class="icon">🧑‍🎓</div>
        <h3>Junior</h3>
        <p>Access guidance, chat support and learning resources designed for junior students.</p>
      </div>

      <div class="card" onclick="location.href='senior.html'">
        <div class="icon">👨‍🎓</div>
        <h3>Senior</h3>
        <p>Guide juniors, mentor them and share your academic experience.</p>
      </div>

    </div>

    <footer>
      © 2026 StudentMate | Project
    </footer>

  </div>

</body>
</html>
