<!DOCTYPE html>
<html>
<head>
  <title>StudentMate | HOD Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0d1117;
      color: #e6edf3;
    }

    .header {
      text-align: center;
      padding: 30px;
      font-size: 26px;
      font-weight: 700;
      color: #22c55e;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin: 20px 0;
      border-radius: 12px;
      border: 1px solid #30363d;
      background: #161b22;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #30363d;
    }
       .card:hover {
      transform: translateY(-10px);
      border-color: #58a6ff;
      box-shadow: 0 15px 30px rgba(91, 12, 180, 0.2);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #58a6ff;
    }

    .info {
      font-size: 14px;
      margin: 5px 0;
      color: #8b949e;
    }

    .badge {
      background: green;
      color: white;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      float: right;
    }

    .delete-btn {
      margin-top: 12px;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      cursor: pointer;
    }
    .delete-btn:hover {
       transform: translateY(-3px);
    }

    .empty {
      text-align: center;
      margin-top: 40px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="header">
  🏫 HOD – Approved Projects
</div>

<div class="container">

  <!-- 🔍 SEARCH -->
  <input type="text" id="search" class="search-box" placeholder="Search approved projects...">

  <div id="projects" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const config = {
  apiKey: "AIzaSyCvcwHqg1NdO_VjpdJDwGSDTDF6MBziMdQ",
  authDomain: "studentmate-project.firebaseapp.com",
  projectId: "studentmate-project"
};

const app = initializeApp(config);
const db = getFirestore(app);

let allProjects = [];

/* LOAD APPROVED PROJECTS */
async function loadProjects() {

    const snapshot = await getDocs(collection(db, "projects"));
    allProjects = [];

    snapshot.forEach((d) => {
        let p = d.data();
        p.id = d.id;
        allProjects.push(p);
    });

    displayProjects(allProjects);
}

/* DISPLAY */
function displayProjects(data) {

    let html = "";
    let found = false;

    data.forEach(p => {

        if (p.status === "approved") {

            found = true;

            html += `
                <div class="card">
                    <span class="badge">Approved</span>
                    <div class="title">${p.projectName}</div>
                    <div class="info"><strong>Dept:</strong> ${p.deptNo}</div>
                    <div class="info"><strong>Guide:</strong> ${p.guideName}</div>
                    <div class="info"><strong>Frontend:</strong> ${p.frontendTech}</div>
                    <div class="info"><strong>Backend:</strong> ${p.backendTech}</div>
                    <div class="info"><strong>Description:</strong> ${p.desc}</div>

                    <button class="delete-btn" onclick="removeProject('${p.id}')">
                        Delete
                    </button>
                </div>
            `;
        }

    });

    if (!found) {
        html = `<div class="empty">No approved projects 🚀</div>`;
    }

    document.getElementById("projects").innerHTML = html;
}

/* 🔍 SEARCH */
document.getElementById("search").addEventListener("input", function() {

    let value = this.value.toLowerCase();

    let filtered = allProjects.filter(p => 
        p.projectName.toLowerCase().includes(value) ||
        p.guideName.toLowerCase().includes(value) ||
        p.deptNo.toLowerCase().includes(value)
    );

    displayProjects(filtered);
});

/* DELETE */
window.removeProject = async function(id) {

    if (confirm("Delete this project?")) {
        await deleteDoc(doc(db, "projects", id));
        alert("Deleted!");
        loadProjects();
    }
}

/* START */
loadProjects();

</script>

</body>
</html>
