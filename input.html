<!DOCTYPE html>
<html>
<head>
    <title>StudentMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        /* GLOBAL */
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Poppins', sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #58a6ff;
        }

        nav a {
            text-decoration: none;
            color: #8b949e;
            margin-left: 30px;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #58a6ff;
        }

        /* CONTAINER */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        /* BOX */
        .box {
            background: #161b22;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #58a6ff;
        }

        h3 {
            margin-top: 20px;
            color: #58a6ff;
        }

        /* INPUTS AND TEXTAREAS */
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-size: 14px;
            background: #0d1117;
            color: #e6edf3;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 8px rgba(88,166,255,0.4);
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(90deg, #58a6ff, #8b5cf6);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88,166,255,0.4);
        }

        /* PHOTO PREVIEW */
        #preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
            margin-bottom: 10px;
            border: 2px solid #58a6ff;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">🎓 StudentMate</div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="container">
    <div class="box">

        <h2>Resume Builder</h2>

        <h3>Profile Photo (Optional)</h3>
        <img id="preview">
        <input type="file" id="photo" accept="image/*" onchange="previewPhoto(event)">

        <input type="text" id="firstname" placeholder="First Name">
        <input type="text" id="lastname" placeholder="Last Name">

        <input type="text" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone">
        <input type="text" id="address" placeholder="Address">

        <textarea id="objective" placeholder="Career Objective"></textarea>

        <h3>Technical Skills (Optional)</h3>
        <textarea id="frontend" placeholder="Front-End"></textarea>
        <textarea id="backend" placeholder="Back-End"></textarea>
        <textarea id="database" placeholder="Database"></textarea>
        <textarea id="tools" placeholder="Tools"></textarea>

        <h3>Soft Skills</h3>
        <textarea id="softskills"></textarea>

        <h3>Education</h3>
        <input type="text" id="degree" placeholder="Degree">
        <input type="text" id="college" placeholder="College">
        <input type="text" id="year" placeholder="Year">
        <input type="text" id="cgpa" placeholder="CGPA">

        <h3>Projects (Optional)</h3>
        <textarea id="projects"></textarea>

        <h3>Experience (Optional)</h3>
        <textarea id="experience"></textarea>

        <h3>Certificates (Optional)</h3>
        <textarea id="certificates"></textarea>

        <button class="btn" onclick="saveData()">Generate Resume</button>

    </div>
</div>

<script>
let photoData="";
function previewPhoto(e){
    let file=e.target.files[0];
    if(file){
        let reader=new FileReader();
        reader.onload=function(event){
            photoData=event.target.result;
            document.getElementById("preview").src=photoData;
            document.getElementById("preview").style.display="block";
        }
        reader.readAsDataURL(file);
    }
}

function saveData(){
    let firstname=document.getElementById("firstname").value.trim();
    let lastname=document.getElementById("lastname").value.trim();
    let email=document.getElementById("email").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let address=document.getElementById("address").value.trim();
    let objective=document.getElementById("objective").value.trim();
    let degree=document.getElementById("degree").value.trim();
    let college=document.getElementById("college").value.trim();
    let year=document.getElementById("year").value.trim();
    let cgpa=document.getElementById("cgpa").value.trim();

    if(!firstname || !lastname || !email || !phone || !address || !objective || !degree || !college || !year || !cgpa){
        alert("Please fill all required fields!");
        return;
    }

    let emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){ alert("Enter valid email!"); return; }

    let phonePattern=/^[0-9]{10}$/;
    if(!phonePattern.test(phone)){ alert("Enter valid 10-digit phone!"); return; }

    if(!/^[0-9]{4}$/.test(year)){ alert("Enter valid year!"); return; }

    let cg=parseFloat(cgpa);
    if(isNaN(cg) || cg<0 || cg>10){ alert("CGPA must be between 0 and 10!"); return; }

    const fields=[
        "firstname","lastname","email","phone","address","objective",
        "frontend","backend","database","tools","softskills",
        "degree","college","year","cgpa","projects","experience","certificates"
    ];

    fields.forEach(id=>{ localStorage.setItem(id,document.getElementById(id).value.trim()); });
    localStorage.setItem("photo",photoData);

    alert("Resume Generated Successfully!");
    window.location.href="outputt.html";
}
</script>

</body>
</html>
