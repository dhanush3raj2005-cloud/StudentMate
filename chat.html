<!DOCTYPE html>
<html>
<head>
    <title>StudentMate | Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e2e8f0;
        }

        /* HEADER */
        .header {
            background: #0f172a;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        .header h2 {
            font-weight: 600;
            color: #ffffff;
        }

        #welcome {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* CHAT AREA */
        #chat {
            flex: 1;
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            margin-bottom: 15px;
            border-radius: 16px;
            font-size: 14px;
            word-wrap: break-word;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .left {
            align-self: flex-start;
            background: #1e293b;
            border-bottom-left-radius: 4px;
        }

        .right {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        /* INPUT AREA */
        .input-area {
            background: #0f172a;
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #1e293b;
        }

        #msg {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #334155;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        #msg:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }

        #sendBtn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(37,99,235,0.4);
        }

        #sendBtn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        /* SCROLLBAR */
        #chat::-webkit-scrollbar {
            width: 6px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>🎓 StudentMate Chat</h2>
    <p id="welcome"></p>
</div>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Type your message...">
    <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyADps0h7E0L27mPaEGBBZNWoUn1pJesdho",
  authDomain: "studentmate-chat.firebaseapp.com",
  projectId: "studentmate-chat",
  storageBucket: "studentmate-chat.firebasestorage.app",
  messagingSenderId: "860844895947",
  appId: "1:860844895947:web:3677fa3ac624182f2e354e",
  measurementId: "G-GKKHD2VWV5"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const chatRef = collection(db, "chats");

/* Logged-in User */
const username = localStorage.getItem("username") || "Anonymous";
document.getElementById("welcome").innerText =
    `Welcome, ${username}`;

/* Send Message */
async function sendMessage() {
    const text = document.getElementById("msg").value.trim();
    if (!text) return;

    await addDoc(chatRef, {
        senderName: username,
        message: text,
        time: Date.now()
    });

    document.getElementById("msg").value = "";
}

/* Ordered Query */
const q = query(chatRef, orderBy("time", "asc"));


/*    */


onSnapshot(q, (snapshot) => {

    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";
/*  loop  */
    snapshot.forEach(doc => {
        const data = doc.data();

        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message");

        if (data.senderName === username) {
            msgDiv.classList.add("right");
        } else {
            msgDiv.classList.add("left");
        }

        msgDiv.innerHTML = `
            <div class="sender">${data.senderName}</div>
            <div>${data.message}</div>
        `;

        chatBox.appendChild(msgDiv);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
});

/* Events */
document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
